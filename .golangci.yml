version: "2"

run:
    timeout: 3m

linters:
    enable:
        - errcheck
        - govet
        - ineffassign
        - revive
        - staticcheck
    settings:
        revive:
            rules:
                - name: package-comments
                  disabled: true
                - name: exported
                  disabled: true

issues:
    max-issues-per-linter: 0
    max-same-issues: 0
