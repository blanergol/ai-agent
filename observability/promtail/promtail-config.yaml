server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: agent-core-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: agent-core
          service: agent-core
          __path__: /var/log/agent/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            session_id: session_id
            correlation_id: correlation_id
            user_sub_hash: user_sub_hash
      - labels:
          level:
